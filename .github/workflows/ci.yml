name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner type"
        required: true
        default: "self-hosted"
        type: choice
        options:
          - ubuntu-latest
          - self-hosted
  schedule:
    - cron: "0 */6 * * *"

# Cancela ejecuciones en curso de la misma rama cuando llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runner-health:
    if: github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted'
    runs-on: [self-hosted, ts]
    timeout-minutes: 2
    permissions: {}
    steps:
      - name: Connectivity check
        run: |
          echo "::notice::Runner: $(hostname) | Kernel: $(uname -r)"
          echo "::notice::Docker: $(docker --version 2>/dev/null || echo 'N/A')"
          curl -so /dev/null -w "api.github.com: %{http_code} (%{time_total}s)\n" \
            https://api.github.com
          curl -so /dev/null -w "broker: %{http_code} (%{time_total}s)\n" \
            https://broker.actions.githubusercontent.com
      - name: Host resources
        run: |
          echo "::notice::CPU: $(nproc) cores, load: $(uptime | awk -F'average:' '{print $2}' | xargs)"
          echo "::notice::RAM: $(free -h | awk '/^Mem:/{print $3 "/" $2 " used"}')"
          echo "::notice::Disk: $(df -h / | awk 'NR==2{print $3 "/" $2 " (" $5 ")"}')"
          if command -v nvidia-smi &>/dev/null; then
            echo "::notice::GPU: $(nvidia-smi --query-gpu=temperature.gpu,memory.used,memory.total --format=csv,noheader 2>/dev/null || echo 'N/A')"
          fi
      - name: Check broker health from logs
        run: |
          RECENT=$(find /actions-runner/_diag/ -name 'Runner_*.log' -mmin -3 | sort | tail -1)
          if [ -n "$RECENT" ]; then
            ERRORS=$(grep -c 'ERR.*BrokerServer' "$RECENT" 2>/dev/null || echo 0)
            if [ "$ERRORS" -gt 0 ]; then
              echo "::warning::Broker errors in last 3 min: ${ERRORS}"
            else
              echo "::notice::Broker healthy (0 errors)"
            fi
          else
            echo "::warning::No recent runner logs found"
          fi

  smoke:
    if: github.event_name == 'schedule'
    runs-on: [self-hosted, ts]
    timeout-minutes: 2
    permissions: {}
    steps:
      - run: echo "ok" && exit 0

  build:
    runs-on: ${{ (github.event_name == 'workflow_dispatch' && inputs.runner) || 'ubuntu-latest' }}
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - name: Validate GH Action SHAs exist in their repos
        run: npm run verify:action-shas
      - name: Verify vercel.json config consistency
        run: npm run verify:vercel
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  e2e:
    runs-on: ${{ (github.event_name == 'workflow_dispatch' && inputs.runner) || 'ubuntu-latest' }}
    needs: build
    timeout-minutes: 20
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

  lhci:
    runs-on: ${{ (github.event_name == 'workflow_dispatch' && inputs.runner) || 'ubuntu-latest' }}
    needs: build
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Validate JSON-LD
        run: npm run validate-jsonld
      - name: Run Lighthouse CI
        run: npx @lhci/cli@0.14.x autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ${{ (github.event_name == 'workflow_dispatch' && inputs.runner) || 'ubuntu-latest' }}
    needs: [build, e2e, lhci]
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - name: Deploy to Vercel (production)
        run: |
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ]; then
            npx vercel deploy --prod --token "${{ secrets.VERCEL_TOKEN }}" --scope alexendros-team --yes
          else
            echo "::warning::VERCEL_TOKEN not set in repo secrets. Skipping deploy."
            echo "::warning::Set VERCEL_TOKEN at https://github.com/Iniciativas-Alexendros/website-alexendrosme/settings/secrets/actions"
            echo "::warning::Token can be created at https://vercel.com/account/tokens"
          fi
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  pr-summary:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [build, e2e, lhci]
    timeout-minutes: 5
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          BUILD_RESULT: ${{ needs.build.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
          LHCI_RESULT: ${{ needs.lhci.result }}
        with:
          script: |
            const statusIcon = (r) => {
              if (r === 'success') return '✅';
              if (r === 'failure') return '❌';
              if (r === 'cancelled') return '⏭️';
              return '❓';
            };

            const checks = [
              { name: '**Build** (format:check, typecheck, lint, test, build)', result: process.env.BUILD_RESULT },
              { name: '**E2E Tests** (Playwright)', result: process.env.E2E_RESULT },
              { name: '**Lighthouse CI** (rendimiento, accesibilidad, SEO)', result: process.env.LHCI_RESULT },
            ];

            const allPassed = checks.every(c => c.result === 'success');

            let body = `## CI Checklist\n\n`;
            body += `| Check | Status |\n`;
            body += `|---|---|\n`;
            for (const c of checks) {
              body += `| ${c.name} | ${statusIcon(c.result)} |\n`;
            }
            body += `\n**Resultado:** ${allPassed ? '✅ Todos los checks pasaron — listo para merge.' : '❌ Algunos checks fallaron — revisa antes de mergear.'}\n`;
            body += `\n---\n_Actualizado automáticamente por el workflow CI._\n`;

            const issueNumber = context.issue.number || context.payload.pull_request?.number;
            if (!issueNumber) {
              console.log('Not a pull request — skipping comment.');
              return;
            }

            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: issueNumber,
            });

            const existing = comments.find(c =>
              c.body.includes('## CI Checklist') &&
              c.user.type === 'Bot'
            );

            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issueNumber,
                body,
              });
            }
