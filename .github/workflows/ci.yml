name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner type"
        required: true
        default: "self-hosted"
        type: choice
        options:
          - ubuntu-latest
          - self-hosted
  schedule:
    - cron: "0 */6 * * *"

# Cancela ejecuciones en curso de la misma rama cuando llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runner-health:
    if: github.event_name == 'workflow_dispatch' && inputs.runner == 'self-hosted'
    runs-on: [self-hosted, ts]
    timeout-minutes: 2
    permissions: {}
    steps:
      - name: Connectivity check
        run: |
          echo "::notice::Runner: $(hostname) | Kernel: $(uname -r)"
          echo "::notice::Docker: $(docker --version 2>/dev/null || echo 'N/A')"
          curl -so /dev/null -w "api.github.com: %{http_code} (%{time_total}s)\n" \
            https://api.github.com
          curl -so /dev/null -w "broker: %{http_code} (%{time_total}s)\n" \
            https://broker.actions.githubusercontent.com
      - name: Host resources
        run: |
          echo "::notice::CPU: $(nproc) cores, load: $(uptime | awk -F'average:' '{print $2}' | xargs)"
          echo "::notice::RAM: $(free -h | awk '/^Mem:/{print $3 "/" $2 " used"}')"
          echo "::notice::Disk: $(df -h / | awk 'NR==2{print $3 "/" $2 " (" $5 ")"}')"
          if command -v nvidia-smi &>/dev/null; then
            echo "::notice::GPU: $(nvidia-smi --query-gpu=temperature.gpu,memory.used,memory.total --format=csv,noheader 2>/dev/null || echo 'N/A')"
          fi
      - name: Check broker health from logs
        run: |
          RECENT=$(find /actions-runner/_diag/ -name 'Runner_*.log' -mmin -3 | sort | tail -1)
          if [ -n "$RECENT" ]; then
            ERRORS=$(grep -c 'ERR.*BrokerServer' "$RECENT" 2>/dev/null || echo 0)
            if [ "$ERRORS" -gt 0 ]; then
              echo "::warning::Broker errors in last 3 min: ${ERRORS}"
            else
              echo "::notice::Broker healthy (0 errors)"
            fi
          else
            echo "::warning::No recent runner logs found"
          fi

  smoke:
    if: github.event_name == 'schedule'
    runs-on: [self-hosted, ts]
    timeout-minutes: 2
    permissions: {}
    steps:
      - run: echo "ok" && exit 0

  build:
    runs-on: ${{ (github.event_name == 'workflow_dispatch' && inputs.runner) || 'ubuntu-latest' }}
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  e2e:
    runs-on: ${{ (github.event_name == 'workflow_dispatch' && inputs.runner) || 'ubuntu-latest' }}
    needs: build
    timeout-minutes: 20
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Run E2E tests
        run: npm run test:e2e
        env:
          CI: true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

  lhci:
    runs-on: ${{ (github.event_name == 'workflow_dispatch' && inputs.runner) || 'ubuntu-latest' }}
    needs: build
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: ".nvmrc"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Validate JSON-LD
        run: npm run validate-jsonld
      - name: Run Lighthouse CI
        run: npx @lhci/cli@0.14.x autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
