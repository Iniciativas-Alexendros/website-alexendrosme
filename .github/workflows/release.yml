name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versión (semver: major/minor/patch o X.Y.Z)"
        required: true
        type: string
      tag_message:
        description: "Mensaje del tag firmado"
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: [self-hosted, ts]
    timeout-minutes: 10
    steps:
      - name: Checkout (full history for tagging)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreferrer.github.com"

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --import --batch --yes
          echo "imported key:"
          gpg --list-secret-keys --keyid-format=long

      - name: Create signed tag
        env:
          PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          VERSION="${{ inputs.version }}"
          TAG="v$VERSION"
          MSG="${{ inputs.tag_message || 'Release ' }}$TAG"
          git tag -s "$TAG" -m "$MSG"
          echo "Created signed tag: $TAG"

      - name: Push tag
        run: git push origin "${{ github.ref_name }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ inputs.version }}
          generate_release_notes: true
          files: |
            out/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
