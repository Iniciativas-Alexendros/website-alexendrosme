name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versión (semver: major/minor/patch o X.Y.Z)"
        required: true
        type: string
      tag_message:
        description: "Mensaje del tag firmado"
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: [self-hosted, ts]
    timeout-minutes: 10
    steps:
      - name: Checkout (full history for tagging)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreferrer.github.com"

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --import --batch --yes
          echo "imported key:"
          gpg --list-secret-keys --keyid-format=long

      - name: Create signed tag
        env:
          PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          VERSION: ${{ inputs.version }}
          TAG_MESSAGE: ${{ inputs.tag_message }}
        run: |
          TAG="v$VERSION"
          MSG="${TAG_MESSAGE:-Release }$TAG"
          git tag -s "$TAG" -m "$MSG"
          echo "Created signed tag: $TAG"

      - name: Push tag
        env:
          REF_NAME: ${{ github.ref_name }}
        run: git push origin "$REF_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c12583777ecdfd3be55c69cf75464299dc01057e # v3
        with:
          tag_name: v${{ inputs.version }}
          generate_release_notes: true
          files: |
            out/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
