name: Release

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Versión (semver: major/minor/patch o X.Y.Z)"
        required: false
        type: string
      tag_message:
        description: "Mensaje del tag firmado"
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: [self-hosted, ts]
    timeout-minutes: 10
    steps:
      - name: Checkout (full history for tagging)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Determine version
        id: version
        env:
          MANUAL_VERSION: ${{ inputs.version || '' }}
        run: |
          if [ -n "$MANUAL_VERSION" ]; then
            echo "version=$MANUAL_VERSION" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            git fetch --tags --force
            NEXT=$(bash scripts/get-next-version.sh) || true
            if [ -z "$NEXT" ]; then
              echo "::notice::No se requiere release (sin cambios relevantes)"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "version=${NEXT#v}" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Git
        if: steps.version.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreferrer.github.com"

      - name: Check GPG key
        id: gpg-check
        if: steps.version.outputs.skip != 'true'
        run: |
          if [ -n "${{ secrets.GPG_PRIVATE_KEY }}" ]; then
            echo "has_gpg=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_gpg=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import GPG key
        if: >
          steps.version.outputs.skip != 'true' &&
          steps.gpg-check.outputs.has_gpg == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --import --batch --yes
          echo "imported key:"
          gpg --list-secret-keys --keyid-format=long

      - name: Extract changelog section
        id: changelog
        if: steps.version.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          BODY=$(bash scripts/extract-changelog.sh "$VERSION" 2>/dev/null) || true
          # Always create the file, even if empty (body_path always referenced)
          echo "${BODY:-}" > /tmp/release-body.md
          if [ -n "$BODY" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Changelog extraído para v$VERSION"
          fi

      - name: Update README with latest release
        if: steps.changelog.outputs.found == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          SNIPPET=$(bash scripts/extract-changelog.sh "$VERSION" --readme)
          # Replace content between RELEASE_SECTION markers in README.md
          # NOTE: snippet already includes its own markers, so we don't print
          # the original START marker — just the snippet replaces the block.
          awk -v snippet="$SNIPPET" '
            /<!-- RELEASE_SECTION_START -->/ { print snippet; found=1; next }
            /<!-- RELEASE_SECTION_END -->/ { found=0; next }
            found { next }
            { print }
          ' README.md > README.tmp && mv README.tmp README.md
          git add README.md
          git commit -m "docs: update README with v${VERSION} changelog" || true

      - name: Create tag
        if: steps.version.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG_MESSAGE: ${{ inputs.tag_message || '' }}
          HAS_GPG: ${{ steps.gpg-check.outputs.has_gpg }}
        run: |
          TAG="v$VERSION"
          MSG="${TAG_MESSAGE:-Release }$TAG"
          if [ "$HAS_GPG" = "true" ]; then
            git tag -s "$TAG" -m "$MSG"
          else
            git tag -a "$TAG" -m "$MSG"
          fi
          echo "Created tag: $TAG (signed=$HAS_GPG)"

      - name: Push tag
        if: steps.version.outputs.skip != 'true'
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          git push origin main --follow-tags

      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          body_path: /tmp/release-body.md
          generate_release_notes: ${{ steps.changelog.outputs.found != 'true' }}
          files: |
            out/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
