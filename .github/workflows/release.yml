name: Release

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Versión (semver: major/minor/patch o X.Y.Z)"
        required: false
        type: string
      tag_message:
        description: "Mensaje del tag firmado"
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  check-version:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: [self-hosted, ts]
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      skip: ${{ steps.version.outputs.skip }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - run: npm ci

      - name: Determine version
        id: version
        env:
          MANUAL_VERSION: ${{ inputs.version || '' }}
        run: |
          if [ -n "$MANUAL_VERSION" ]; then
            echo "version=$MANUAL_VERSION" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            git fetch --tags --force
            NEXT=$(bash scripts/get-next-version.sh) || true
            if [ -z "$NEXT" ]; then
              echo "::notice::No se requiere release (sin cambios relevantes)"
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "version=${NEXT#v}" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  do-release:
    if: needs.check-version.outputs.skip != 'true'
    runs-on: [self-hosted, ts]
    needs: check-version
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: site-build-${{ needs.check-version.outputs.version }}
          path: out/
          if-no-files-found: error

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreferrer.github.com"

      - name: Update package.json version
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          node -e "
            const pkg = require('./package.json');
            const old = pkg.version;
            pkg.version = process.env.VERSION;
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('package.json: ' + old + ' → ' + pkg.version);
          "
          git add package.json
          git commit -m "chore(release): v${VERSION}" || true

      - name: Check GPG key
        id: gpg-check
        run: |
          if [ -n "${{ secrets.GPG_PRIVATE_KEY }}" ]; then
            echo "has_gpg=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_gpg=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Import GPG key
        if: steps.gpg-check.outputs.has_gpg == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --import --batch --yes
          echo "imported key:"
          gpg --list-secret-keys --keyid-format=long

      - name: Extract changelog section
        id: changelog
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          BODY=$(bash scripts/extract-changelog.sh "$VERSION" 2>/dev/null) || true
          echo "${BODY:-}" > /tmp/release-body.md
          if [ -n "$BODY" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Changelog extraído para v$VERSION"
          fi

      - name: Update README with latest release
        if: steps.changelog.outputs.found == 'true'
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          SNIPPET=$(bash scripts/extract-changelog.sh "$VERSION" --readme)
          awk -v snippet="$SNIPPET" '
            /<!-- RELEASE_SECTION_START -->/ { print snippet; found=1; next }
            /<!-- RELEASE_SECTION_END -->/ { found=0; next }
            found { next }
            { print }
          ' README.md > README.tmp && mv README.tmp README.md
          git add README.md
          git commit -m "docs: update README with v${VERSION} changelog" || true

      - name: Create tag
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
          TAG_MESSAGE: ${{ inputs.tag_message || '' }}
          HAS_GPG: ${{ steps.gpg-check.outputs.has_gpg }}
        run: |
          TAG="v$VERSION"
          MSG="${TAG_MESSAGE:-Release }$TAG"
          if [ "$HAS_GPG" = "true" ]; then
            git tag -s "$TAG" -m "$MSG"
          else
            git tag -a "$TAG" -m "$MSG"
          fi
          echo "Created tag: $TAG (signed=$HAS_GPG)"

      - name: Validate package.json version matches tag
        env:
          TAG_VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::MISMATCH: package.json ($PKG_VERSION) ≠ tag (v$TAG_VERSION)"
            exit 1
          fi
          echo "::notice::✅ package.json ($PKG_VERSION) coincide con el tag (v$TAG_VERSION)"

      - name: Push tag
        run: |
          TAG="v${{ needs.check-version.outputs.version }}"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          body_path: /tmp/release-body.md
          generate_release_notes: ${{ steps.changelog.outputs.found != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate package.json version matches tag
        env:
          TAG_VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          PKG_VERSION=$(node -e "console.log(require('./package.json').version)")
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::MISMATCH: package.json version ($PKG_VERSION) ≠ tag version (v$TAG_VERSION)"
            exit 1
          fi
          echo "::notice::✅ package.json version ($PKG_VERSION) coincide con el tag (v$TAG_VERSION)"
